name: Eval Nightly (recall gate)

# ADR-V6-030 (fixes ADR-V6-022 B9: "CI 关键路径全 mock + run_eval 不进 CI").
# A nightly lane that runs the REAL DeepSeek-backed extraction eval and fails CI
# on a RECALL regression. Precision is never gated (ADR-V6-026 deferred_structural).
#
# Triggers: nightly cron + manual workflow_dispatch. NOT a PR gate — run_eval
# costs real LLM calls, so it is observability, not a per-PR check.
#
# 桶D boundary: the lane is DORMANT until the DEEPSEEK_API_KEY Actions secret is
# added. Dormancy emits ::warning:: (ADR-V6-055: 升级自 ::notice:: 更显眼) + a 7-day
# liveness check (no eval-report artifact in 7d → 黄牌). Exit 0 = dormant, NOT
# green-faking (skip logged). Once armed, runs recall gate, exits 1 on RED.

on:
  schedule:
    # 16:17 UTC ≈ 00:17 Beijing — off-minute to dodge the :00 fleet stampede.
    - cron: '17 16 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Sample cap (default 30 for nightly; full 200 for a manual deep run)'
        required: false
        default: '30'

permissions:
  contents: read
  actions: read  # ADR-V6-055: liveness step 查 7 天 eval-report artifact

concurrency:
  group: eval-nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  eval:
    name: Recall gate (real DeepSeek)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # 8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        uses: ./.github/actions/retry
        with:
          command: uv sync --locked --python 3.11 --extra all --extra dev

      - name: Run eval (recall gate; dormant without DEEPSEEK_API_KEY)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          LIMIT: ${{ github.event.inputs.limit || '30' }}
        run: |
          set -euo pipefail
          source .venv/bin/activate
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "::warning::ADR-V6-030/055 eval lane DORMANT — DEEPSEEK_API_KEY Actions secret 未配置 (桶D). recall gate 理论盾零拦截. armed: gh secret set DEEPSEEK_API_KEY; gh secret set DEEPSEEK_BASE_URL. Exit 0 = dormant, NOT green-faking (skip logged + 7-day liveness step flags)."
            exit 0
          fi
          # Real eval: recall gate. --ci-gate exits 1 on RED (ADR-V6-030).
          # Precision is REPORTED but never gated (ADR-V6-026 deferred_structural).
          python -m tests.benchmark.run_eval \
            --limit "$LIMIT" --workers 8 --ci-gate --out eval-report.json

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eval-report
          path: eval-report.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Recall-gate liveness check (ADR-V6-055)
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          # 最近一次完成的 eval-nightly run 是否产了 eval-report artifact？
          # dormant run 不产 artifact（if-no-files-found: ignore），故无 artifact
          # = 仍 dormant = recall gate 理论盾。本 step 把"门禁假装存在"升级为可见黄牌。
          latest=$(gh run list -R "${{ github.repository }}" \
            --workflow=eval-nightly.yml --status completed --limit 1 \
            --json databaseId,createdAt --jq '.[0]') || latest=""
          if [ -z "$latest" ]; then
            echo "ℹ️ 无历史 eval-nightly run（首次调度或刚启用）"
            exit 0
          fi
          rid=$(echo "$latest" | jq -r '.databaseId')
          created=$(echo "$latest" | jq -r '.createdAt')
          cutoff=$(date -u -d '7 days ago' '+%Y-%m-%dT%H:%M:%SZ')
          if [[ "$created" < "$cutoff" ]]; then
            echo "::warning::ADR-V6-055 eval-nightly 最近一次 run 在 7 天前（$created），recall gate 长期沉睡（理论盾）。armed: gh secret set DEEPSEEK_API_KEY; gh secret set DEEPSEEK_BASE_URL"
            exit 0
          fi
          n=$(gh api "repos/${{ github.repository }}/actions/runs/${rid}/artifacts" \
            --jq '[.artifacts[]? | select(.name=="eval-report")] | length' 2>/dev/null) || n=0
          if [ "${n:-0}" -ge 1 ]; then
            echo "✓ ADR-V6-055: 最近 eval-nightly run ($created) 有 eval-report artifact，recall gate armed"
          else
            echo "::warning::ADR-V6-055 最近 eval-nightly run ($created) 无 eval-report artifact — recall gate DORMANT（理论盾）。armed: gh secret set DEEPSEEK_API_KEY; gh secret set DEEPSEEK_BASE_URL"
          fi
