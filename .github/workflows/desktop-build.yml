name: desktop-build

# Build RealityOS desktop installers (mac dmg + win nsis) via CI runners.
# Implements ADR-V6-010 decision 3: distribution builds on CI, not local Wine.
#   * macos-latest → RealityOS-<v>-mac-arm64.dmg  (reproduces the validated
#     local mac build; the dmg is the reference installer.)
#   * windows-latest → RealityOS-<v>-win-x64.exe (nsis)  (new: cross-platform
#     coverage without Wine/cross-compile on mac.)
#
# Signing = none (D4 internal-test). build.win.signAndEditExecutable=false and
# mac skips signing when no Developer ID is present (notarize.mjs is env-gated
# off when APPLE_API_* are absent). The build stamp (install-stamp.json) is
# stamped from the tag's commit (fromLocalGit) — that commit is pushed, so a
# first launch can fetch install.sh at the pinned commit (ADR-V6-010 §决策2).
#
# Triggers: release tags (v*) + manual (workflow_dispatch). Not on every push
# — installer builds are heavy; artifacts are release-scoped.
#
# ADR-V6-037: a `publish` job (tag-only) attaches the built installers to the
# release that triggered the build, closing the manual artifact→release gap that
# let shipped work (batch 1/2/3) sit unreleased — the work was on main with a
# green CI but never reached the download page (the most consequential fake-green:
# "done" yet undistributable). workflow_dispatch builds still upload artifacts
# only (no release to publish to).
#
# Validation note: YAML + command surface validated locally; the first tagged
# run is the green-signal (3-verify pattern, cf. ADR-084/086): success status +
# artifact present + (mac) matching the locally-validated dmg + (now) release
# assets attached.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref (branch/tag/SHA) to build"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            dist_script: "dist:mac:dmg"
            artifact_glob: "RealityOS-*-mac-arm64.dmg"
            artifact_name: mac-dmg
          - os: windows-latest
            dist_script: "dist:win:nsis"
            artifact_glob: "RealityOS-*-win-*.exe"
            artifact_name: win-nsis

    steps:
      - name: Checkout (full history for build stamp)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            apps/desktop/package-lock.json

      - name: Install desktop workspace deps
        shell: bash
        run: npm install --workspace apps/desktop

      - name: Build installer (${{ matrix.dist_script }})
        shell: bash
        run: npm run ${{ matrix.dist_script }} --workspace apps/desktop

      - name: Validate bundle (mac only — test-desktop validates the dmg/zip layout)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: npm run test:desktop:dmg --workspace apps/desktop

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: apps/desktop/release/${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 30

  # ADR-V6-037: attach the built installers to the release that triggered this
  # tag build. Runs ONLY on tag pushes (a workflow_dispatch build has no release
  # to publish to). Closes the manual gap that left completed work unreleased.
  publish:
    name: publish to release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installer artifacts (flatten)
        uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true

      - name: Attach installers to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No checkout in this job → gh can't infer the repo from a git remote.
          # Point it at the running repo explicitly.
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          echo "Attaching installers to release ${tag}:"
          ls -lh installers/
          # Create the release if it doesn't exist yet (idempotent), then upload.
          if ! gh release view "${tag}" >/dev/null 2>&1; then
            gh release create "${tag}" --target "${{ github.event.base.ref || 'main' }}" \
              --generate-notes --title "${tag}"
          fi
          gh release upload "${tag}" \
            installers/RealityOS-*.dmg \
            installers/RealityOS-*.exe \
            --clobber
          echo "Published. Release assets:"
          gh release view "${tag}" --json assets --jq '.assets[] | "\(.name)  \(.size) bytes"'
